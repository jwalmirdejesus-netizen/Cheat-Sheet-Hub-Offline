(function() {

  if (window.playablesSDK) return;

  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

    return !!(window.parent && window.parent !== window);
  }

    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }

    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {

      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true

  });

    errorSent = true;

obsidian:{icon:'🪨',title:'Obsidian',desc:'Notas ligadas em Markdown, PKM local-first',tags:'obsidian notas markdown pkm zettelkasten dataview',overview:`Obsidian é um cofre local de Markdown com links bidirecionais, graph view e mais de 1.500 plugins. Funciona offline-first: seus arquivos .md ficam no seu disco, versionáveis com Git. Ideal para Zettelkasten, estudos, pesquisa e segunda mente. Escolha sobre Notion quando quer propriedade dos dados, velocidade e customização profunda via Dataview, Templater e Canvas.`,commands:[{cmd:'[[',txt:`<b>O que faz:</b> cria link interno para outra nota. <b>Por quê:</b> conecta ideias. <b>Ex:</b> [[Projeto X]]`},{cmd:'[[nota|alias]]',txt:`<b>O que faz:</b> link com texto diferente. <b>Por quê:</b> legibilidade no parágrafo.`},{cmd:'![[imagem.png]]',txt:`<b>O que faz:</b> embed/transclusão de arquivo. <b>Por quê:</b> mostra conteúdo dentro da nota.`},{cmd:'Ctrl+O',txt:`<b>O que faz:</b> Quick Switcher. <b>Por quê:</b> abre qualquer nota em <1s sem mouse.`},{cmd:'Ctrl+P',txt:`<b>O que faz:</b> Paleta de Comandos. <b>Por quê:</b> acessa todas funções e plugins.`},{cmd:'Ctrl+E',txt:`<b>O que faz:</b> alterna Edição/Preview. <b>Por quê:</b> vê formatação final.`},{cmd:'Ctrl+Shift+F',txt:`<b>O que faz:</b> busca global no vault. <b>Por quê:</b> acha texto em milhares de notas.`},{cmd:'[[#título]]',txt:`<b>O que faz:</b> link para heading específico. <b>Por quê:</b> navegação precisa.`},{cmd:'^',txt:`<b>O que faz:</b> cria ID de bloco e linka. <b>Por quê:</b> referencia parágrafo exato. <b>Ex:</b> ^ideia1`},{cmd:'---',txt:`<b>O que faz:</b> frontmatter YAML. <b>Por quê:</b> metadados para Dataview. <b>Ex:</b> --- tags: estudo ---`}],usecases:[{t:'Zettelkasten em 5 passos',s:['1. Nota atômica por ideia com [[','2. Use links, não pastas','3. Adicione tags #permanente','4. Revise no Graph View','5. Conecte diário → permanente']},{t:'Dashboard de estudos com Dataview',s:['Frontmatter: curso, status, data','Query: TABLE status FROM #aula','Filtre por status!="concluído"','Adicione SORT data DESC']},{t:'Diário + tarefas',s:['Ative Periodic Notes','Template diário com {{date}}','Use - [ ] para tasks','Dataview lista tarefas atrasadas']},{t:'Pesquisa acadêmica',s:['PDF no vault + anotações','Link com [[artigo^bloco]]','Canvas para mapa mental','Exporte via Pandoc para DOCX']}],tips:{pro:['Dataview = SQL para notas','Templater + hotkeys economiza horas','Canvas para brainstorm visual','Versione vault com Git','Sync via Obsidian Sync ou Syncthing','CSS Snippets para tema','Use aliases consistentes','Properties > tags soltas','Excalidraw para diagramas','Core plugin Outliner para listas'],erros:['Vault direto no iCloud/Drive causa corrupção','Notas gigantes em vez de atômicas','Ignorar backup','Instalar 50 plugins de uma vez','Não padronizar frontmatter','Esquecer links bidirecionais','Imagens sem compressão','Misturar pessoal e trabalho','Nunca revisar Graph','Não usar Quick Switcher']}},

telegramdesktop:{icon:'✈️',title:'Telegram Desktop',desc:'Mensagens rápidas, canais e automação',tags:'telegram desktop mensagens atalhos bots',overview:`Telegram Desktop sincroniza chats, canais e bots com criptografia MTProto. Suporta arquivos até 4GB, multi-conta, pastas inteligentes e atalhos que aceleram o fluxo de trabalho.`,commands:[{cmd:'Ctrl+K',txt:`<b>O que faz:</b> busca global de chats, pessoas e mensagens. <b>Por quê:</b> pule para qualquer conversa sem usar o mouse.`},{cmd:'Ctrl+F',txt:`<b>O que faz:</b> busca dentro do chat atual. <b>Por quê:</b> encontre uma informação em históricos gigantes.`},{cmd:'Ctrl+0',txt:`<b>O que faz:</b> abre Mensagens Salvas. <b>Por quê:</b> seu bloco de notas na nuvem, sempre à mão.`},{cmd:'Ctrl+1 · 2 · 3 · 4 · 5',txt:`<b>O que faz:</b> pula para as pastas 1 a 5. <b>Por quê:</b> organize Trabalho, Estudos, Canais, etc.`},{cmd:'Ctrl+L',txt:`<b>O que faz:</b> bloqueia o Telegram com senha. <b>Por quê:</b> proteja conversas ao se afastar do PC.`},{cmd:'Ctrl+O',txt:`<b>O que faz:</b> abre seletor de arquivo. <b>Por quê:</b> envie documentos sem arrastar.`},{cmd:'Seta ↑',txt:`<b>O que faz:</b> edita a última mensagem enviada. <b>Por quê:</b> corrija erros sem reescrever tudo.`},{cmd:'Ctrl+Enter',txt:`<b>O que faz:</b> envia mensagem (quando Enter = nova linha). <b>Por quê:</b> escreva textos longos com parágrafos.`},{cmd:'Esc',txt:`<b>O que faz:</b> sai do chat, fecha busca ou cancela ação. <b>Por quê:</b> limpe a tela em 1 toque.`},{cmd:'Ctrl+Shift+M',txt:`<b>O que faz:</b> formata texto em monospace (código). <b>Por quê:</b> compartilhe comandos, logs ou snippets.`}],usecases:[{t:'Fluxo produtivo com pastas',s:['1. Crie pastas: Trabalho, Pessoal, Canais','2. Atribua atalhos Ctrl+1 a Ctrl+3','3. Fixe 3 chats críticos no topo','4. Use Mensagens Salvas como inbox','5. Silencie grupos barulhentos']},{t:'10 formatações essenciais',s:['Ctrl+B = negrito','Ctrl+I = itálico','Ctrl+U = sublinhado','Ctrl+Shift+X = riscado','Ctrl+K = criar link','Ctrl+Shift+M = monospace','Ctrl+Shift+N = remover formatação','```texto``` = bloco de código','**texto** = negrito via markdown','__texto__ = itálico via markdown']},{t:'Automação e arquivos grandes',s:['Envie até 4GB por arquivo','Use bots para alertas (@BotFather)','Encaminhe com comentário (Ctrl)','Arraste e solte pastas inteiras','Programe mensagens para enviar depois']}],tips:{pro:['Combine Ctrl+K + Ctrl+F para busca em 2 níveis','Use Ctrl+L sempre em PC compartilhado','Ative pastas + Ctrl+1-5 para navegação sem mouse','Edite com Seta ↑ para corrigir rápido','Crie atalhos personalizados no macOS'],erros:['Deixar todas notificações ativas','Não configurar senha de bloqueio','Ignorar Mensagens Salvas como CRM pessoal']}},
youtube:{icon:'▶️',title:'YouTube',desc:'Vídeos, Shorts e Lives',tags:'youtube vídeos streaming atalhos creator studio seo',overview:`YouTube é a plataforma #1 para vídeo. Para quem assiste: atalhos aceleram consumo. Para quem cria: algoritmo prioriza <b>CTR</b> (clique na thumb), <b>retenção</b> (quanto tempo assistem) e <b>satisfação</b> (likes, comentários, volta). Use capítulos, transcrições e Shorts para ganhar alcance.`,commands:[
{cmd:'K / Espaço',txt:`<b>O que faz:</b> Play/Pause. K funciona mesmo sem focar no player, ideal para pausar rápido.`},
{cmd:'J',txt:`<b>O que faz:</b> Retrocede 10 segundos. Perfeito para rever um detalhe sem usar o mouse.`},
{cmd:'L',txt:`<b>O que faz:</b> Avança 10 segundos. Use 2x L para pular 20s de enrolação.`},
{cmd:'M',txt:`<b>O que faz:</b> Mutar/Desmutar. Salva quando você precisa atender algo.`},
{cmd:'← / →',txt:`<b>O que faz:</b> Volta/avança 5 segundos com precisão. Mais fino que J/L.`},
{cmd:', / .',txt:`<b>O que faz:</b> Quadro a quadro (com vídeo pausado). Essencial para tutoriais técnicos.`},
{cmd:'0-9',txt:`<b>O que faz:</b> Pula para 0% a 90% do vídeo. 5 = metade, 9 = quase final.`},
{cmd:'< / > (Shift+,/.)',txt:`<b>O que faz:</b> Diminui/aumenta velocidade. < = 0.75x, > = 1.25x, 1.5x, 2x. Estude mais rápido.`},
{cmd:'C',txt:`<b>O que faz:</b> Liga/desliga legendas. Combine com transcrição para copiar trechos.`},
{cmd:'F / T / I',txt:`<b>O que faz:</b> F = tela cheia, T = modo cinema, I = mini-player. Controle total de layout.`}
],usecases:[
{t:'Estudo acelerado',s:['1. Use > para 1.5x-2x','2. J/L para revisar pontos','3. C para ativar legendas + abrir transcrição','4. Salve em playlist "Estudar"']},
{t:'Creator: publicar em 10 min',s:['1. Título com palavra-chave + curiosidade','2. Thumb com 3 elementos máx','3. Capítulos na descrição (00:00)','4. Fixe comentário com CTA']},
{t:'SEO rápido no YouTube',s:['1. Pesquise no YouTube, copie sugestões','2. Use na descrição primeiros 2 parágrafos','3. 3-5 tags específicas','4. End screen para próximo vídeo']}
],tips:{pro:['Use "yt-dlp -f bestvideo+bestaudio" para backup','Transcrição automática > copie e cole no Notion','Shorts: 9:16, gancho nos 2s','A/B test de thumb com YouTube Studio','Analytics > retenção > corte onde cai'],erros:['Título clickbait sem entrega = queda de retenção','Ignorar os primeiros 30s','Postar sem legenda/CC']}},

audacity:{icon:'🎧',title:'Audacity',desc:'Edição de áudio gratuita e profissional',tags:'audacity áudio edição podcast gravação open-source',overview:`Audacity é o editor de áudio gratuito mais popular do mundo. Permite gravar, editar em múltiplas faixas, remover ruído, aplicar compressão, EQ, normalização e exportar em MP3, WAV, OGG e FLAC. Perfeito para podcasts, música, dublagem e restauração de áudio.`,commands:[
{cmd:'Space',txt:`<b>O que faz:</b> Play/Pause. Inicia ou para a reprodução instantaneamente.`},
{cmd:'R',txt:`<b>O que faz:</b> Gravar em nova faixa. Shift+R = gravar continuando ao final.`},
{cmd:'Ctrl+Z / Ctrl+Y',txt:`<b>O que faz:</b> Desfaz / Refaz. Segurança total para testar efeitos.`},
{cmd:'Ctrl+I',txt:`<b>O que faz:</b> Dividir clipe no cursor. Essencial para mover trechos.`},
{cmd:'Ctrl+L',txt:`<b>O que faz:</b> Silenciar seleção (mantém o tempo). Ótimo para pausas.`},
{cmd:'Ctrl+T',txt:`<b>O que faz:</b> Aparar áudio fora da seleção (Trim).`},
{cmd:'Ctrl+1 / Ctrl+2 / Ctrl+3',txt:`<b>O que faz:</b> Zoom in / zoom normal / zoom out na forma de onda.`},
{cmd:'Ctrl+A',txt:`<b>O que faz:</b> Selecionar tudo para aplicar efeitos globais.`},
{cmd:'Ctrl+D',txt:`<b>O que faz:</b> Duplicar seleção em nova faixa.`},
{cmd:'Ctrl+B',txt:`<b>O que faz:</b> Adicionar marcador (label) para organizar cortes.`}
],usecases:[
{t:'Podcast: áudio limpo em 6 passos',s:['1. Grave com R','2. Selecione um trecho só com ruído > Efeito > Redução de Ruído > Obter perfil','3. Ctrl+A > aplique Redução de Ruído (12dB, 6, 3)','4. Efeito > Compressor (limiar -18dB, ratio 3:1)','5. Efeito > Normalize (-1.0dB)','6. Arquivo > Exportar > MP3']},
{t:'Remover erros e respirações',s:['Ouça com Space','Selecione erro > Ctrl+L para silenciar ou Ctrl+X para cortar','Use Ctrl+Z se errar','Use Ctrl+I para dividir e arrastar espaços']},
{t:'Criar fade profissional',s:['Selecione início/fim','Efeito > Fade In / Fade Out','Ou use Ferramenta Envelope (F2) para controle manual']}
],tips:{pro:['Use Macros (Chains) para processar vários episódios','Grave em 48kHz/24-bit, exporte final em 44.1kHz/16-bit','Deixe pico em -6dB ao gravar para evitar clipping','Use etiquetas (Ctrl+B) para marcar capítulos','Salve sempre em .aup3 antes de exportar'],erros:['Gravar muito alto = distorção irreversível','Excesso de Redução de Ruído deixa voz metálica','Exportar em MP3, reimportar e editar de novo (perda)','Esquecer de normalizar antes de publicar','Não fazer backup do projeto']}},
framerx:{icon:'F',title:'Framer X',desc:'Prototipagem interativa com React',tags:'framer x design prototipo mac framerx code override animacao',mac:true,overview:`Framer X (hoje Framer) une design visual e código React para criar protótipos de alta fidelidade que funcionam como apps reais. Você desenha no canvas, adiciona interações, overrides de código e publica links interativos — perfeito para testar fluxos antes do desenvolvimento.`,commands:[{cmd:'⌘+D',txt:`<b>Duplicar:</b> copia qualquer layer mantendo constraints e overrides.`},{cmd:'⌘+K',txt:`<b>Quick Insert:</b> abre paleta para inserir frames, stacks, componentes e pacotes da comunidade.`},{cmd:'F',txt:`<b>Frame Tool:</b> cria frame responsivo — base para layouts com auto-layout.`},{cmd:'R',txt:`<b>Rectangle:</b> adiciona forma vetorial; segure ⇧ para quadrado perfeito.`},{cmd:'T',txt:`<b>Text Tool:</b> insere texto editável com estilos tipográficos.`},{cmd:'⌘+G',txt:`<b>Agrupar em Frame:</b> transforma seleção em frame com auto-layout opcional.`},{cmd:'⌘+⇧+K',txt:`<b>Criar Componente:</b> converte seleção em componente reutilizável com variants.`},{cmd:'⌘+Enter',txt:`<b>Preview:</b> abre preview interativo em nova janela para testar gestures e scroll.`},{cmd:'⌥+Arraste',txt:`<b>Duplicar arrastando:</b> segure Option enquanto arrasta para clonar rápido.`},{cmd:'⌘+/',txt:`<b>Mostrar/Ocultar Layout:</b> ativa grades e colunas para alinhamento pixel-perfect.`}],usecases:[{t:'Protótipo navegável em 10 min',s:['Crie frames para cada tela com F','Ligue com Prototype > Tap','Adicione transição Smart Animate','⌘+Enter para testar','Compartilhe link']},{t:'Componente com Code Override',s:['Selecione botão > Code > Create Override','Escreva useState para toggle','Aplique override no painel direito','Teste no Preview','Publique como pacote']},{t:'Handoff para devs',s:['Nomeie layers semanticamente','Use Auto Layout e constraints','Exporte assets com ⌘+E','Copie CSS/React no painel Inspect','Envie link do projeto']}],tips:{pro:['Use Stacks em vez de grupos para listas responsivas','Crie Variants (hover, pressed) dentro do mesmo componente','Overrides > useMotionValue para animações controladas por scroll','Instale pacotes da comunidade via ⌘+K > Packages','Mantenha arquivo <50MB: converta imagens em WebP antes'],erros:['Aninhar frames infinitos — quebra auto-layout','Esquecer constraints em mobile — layout estoura','Usar imagens 4K direto no canvas — trava preview']} },
googledrive:{icon:'📁',title:'Google Drive',desc:'Armazenamento em nuvem',tags:'google drive cloud storage',overview:`Google Drive sincroniza arquivos com colaboração em tempo real no Docs, Sheets e Slides. Plano gratuito de 15GB (compartilhado com Gmail e Fotos). Suporta unidades compartilhadas, controle de versões, pesquisa avançada com operadores, e acesso offline.`,commands:[{cmd:'Shift+Z',txt:`<b>O que faz:</b> Adicionar atalho do arquivo/pasta em outro local sem duplicar.`},{cmd:'/',txt:`<b>O que faz:</b> Focar na barra de pesquisa.`},{cmd:'n',txt:`<b>O que faz:</b> Abrir menu "Novo".`},{cmd:'Shift+T',txt:`<b>O que faz:</b> Criar novo Documento Google.`},{cmd:'Shift+P',txt:`<b>O que faz:</b> Criar nova Apresentação Google.`},{cmd:'Shift+S',txt:`<b>O que faz:</b> Criar nova Planilha Google.`},{cmd:'x',txt:`<b>O que faz:</b> Selecionar/desselecionar item atual.`},{cmd:'Shift+A',txt:`<b>O que faz:</b> Selecionar todos os itens visíveis.`},{cmd:'z',txt:`<b>O que faz:</b> Mover item para outra pasta.`},{cmd:'.',txt:`<b>O que faz:</b> Abrir diálogo de compartilhamento.`}],usecases:[{t:'Colaboração rápida',s:['Compartilhe com link editável','Use comentários e modo sugestão','Restaure versões em Arquivo > Histórico']},{t:'Organização inteligente',s:['Use “Prioritários” e “Atividade”','Crie atalhos com Shift+Z em vez de cópias','Aplique cores em pastas para achar rápido']},{t:'Backup e sincronização',s:['Instale Drive para computador','Escolha Streaming para economizar espaço','Ative arquivos offline no Chrome']},{t:'Busca avançada',s:['type:pdf owner:me','before:2024-01-01 after:2023-01-01','-owner:me para achar arquivos de terceiros']},{t:'Segurança e governança',s:['Bloqueie download/cópia em arquivos sensíveis','Defina expiração de acesso','Use Unidades Compartilhadas por equipe']}],tips:{pro:['Use Unidades Compartilhadas para projetos, não contas pessoais','Ative “acesso offline” nos arquivos críticos','Nomeie com padrão YYYY-MM-DD para ordenar','Use operadores de busca para limpar os 15GB','Crie formulários que salvam uploads direto na pasta','Limpe “Compartilhados comigo” usando Shift+Z','Use “Fazer uma cópia” antes de editar templates','Evite sincronizar node_modules e builds','Ative notificações de comentários','Use atalhos de teclado para ganhar velocidade'],erros:['Sincronizar tudo e lotar o disco','Compartilhar pasta raiz com link público','Deletar achando que remove só o atalho (apaga original)','Esquecer que lixeira ocupa espaço','Usar conta pessoal para dados da empresa']}},
filezilla:{icon:'Fz',title:'FileZilla',desc:'Cliente FTP/SFTP',tags:'filezilla ftp sftp',overview:`FileZilla é o cliente FTP/FTPS/SFTP gratuito mais usado para transferir arquivos entre seu computador e servidores web. Suporta arrastar e soltar, fila de transferência, retomada de downloads, e gerenciador de sites com criptografia.`,commands:[
{cmd:'Ctrl+S',txt:`<b>O que faz:</b> Abre o Gerenciador de Sites. <b>Quando usar:</b> salvar credenciais FTP/SFTP, definir porta, protocolo e pasta inicial.`},
{cmd:'Ctrl+N',txt:`<b>O que faz:</b> Nova conexão rápida. <b>Quando usar:</b> teste rápido sem salvar site.`},
{cmd:'Ctrl+C',txt:`<b>O que faz:</b> Conectar ao site atual. <b>Dica:</b> funciona após preencher host/usuário/senha na barra superior.`},
{cmd:'Ctrl+D',txt:`<b>O que faz:</b> Desconectar imediatamente. <b>Quando usar:</b> antes de trocar de rede ou VPN.`},
{cmd:'Ctrl+R',txt:`<b>O que faz:</b> Reconectar ao último servidor. <b>Útil:</b> após queda de conexão.`},
{cmd:'F5',txt:`<b>O que faz:</b> Atualiza listas local e remota. <b>Quando usar:</b> após upload via outro cliente.`},
{cmd:'Tab',txt:`<b>O que faz:</b> Alterna foco entre painel local e remoto. <b>Produtividade:</b> navegue sem mouse.`},
{cmd:'F2',txt:`<b>O que faz:</b> Renomear arquivo/pasta selecionado. <b>Atenção:</b> funciona em ambos os lados.`},
{cmd:'Delete',txt:`<b>O que faz:</b> Exclui arquivo remoto/local. <b>Segurança:</b> confirme, não há lixeira no servidor.`},
{cmd:'Ctrl+U',txt:`<b>O que faz:</b> Adiciona seleção à fila de upload. <b>Quando usar:</b> transferências grandes em lote.`},
{cmd:'Ctrl+J',txt:`<b>O que faz:</b> Adiciona seleção à fila de download. <b>Dica:</b> combine com limite de velocidade.`},
{cmd:'Ctrl+P',txt:`<b>O que faz:</b> Abre Configurações. <b>Onde ajustar:</b> modo passivo, limite de conexões, SFTP keys.`}
],usecases:[
{t:'Publicar site WordPress',s:['Abra Ctrl+S, crie novo site com FTPS, porta 21','Conecte com Ctrl+C','No painel remoto vá para /public_html','Arraste wp-content do local para remoto','Monitore fila, clique direito > Processar fila']},
{t:'Backup completo via SFTP',s:['Configure site com protocolo SFTP porta 22','Ative "Limitar conexões simultâneas" em Ctrl+P','Navegue até /home/usuario','Selecione tudo (Ctrl+A), Ctrl+J para baixar','Use F5 após concluir para validar tamanhos']},
{t:'Corrigir permissões 403',s:['Conecte, clique direito em pasta remota','Escolha Permissões de arquivo','Defina 755 para pastas, 644 para arquivos','Marque "Recursivo para subdiretórios"','Atualize com F5 e teste no navegador']}
],tips:{pro:['Use Gerenciador de Sites com senhas protegidas por senha mestra','Ative modo passivo em redes com firewall','Limite a 2 conexões simultâneas para evitar ban','Salve chaves SSH .ppk para SFTP em Editar > Configurações > SFTP','Habilite comparação de diretórios (Exibir > Comparação) para sincronizar'],erros:['Conectar em FTP simples em vez de FTPS/SFTP expõe senha','Arrastar pasta inteira sem fila causa timeout','Ignorar certificado inválido sem verificar fingerprint']}},
reddit:{icon:'👽',title:'Reddit',desc:'Comunidades e fóruns',tags:'reddit forum community atalhos teclado',overview:`Reddit reúne milhares de comunidades (subreddits) sobre qualquer tema. Use atalhos de teclado, filtros avançados e multireddits para consumir conteúdo 5x mais rápido, sem perder tempo no feed infinito.`,commands:[{cmd:'J / K',txt:`<b>O que faz:</b> Navegar para o próximo (J) ou anterior (K) post sem usar o mouse.`},{cmd:'Enter',txt:`<b>O que faz:</b> Abrir o post selecionado e pular direto para os comentários.`},{cmd:'C',txt:`<b>O que faz:</b> Abrir a caixa de comentário instantaneamente.`},{cmd:'X',txt:`<b>O que faz:</b> Expandir ou recolher mídia (imagem, vídeo, galeria) do post.`},{cmd:'S',txt:`<b>O que faz:</b> Salvar o post em 'Saved' para ler depois.`},{cmd:'H',txt:`<b>O que faz:</b> Esconder o post do seu feed permanentemente.`},{cmd:'U / D',txt:`<b>O que faz:</b> Dar upvote (U) ou downvote (D) sem clicar.`},{cmd:'R',txt:`<b>O que faz:</b> Ir direto para o subreddit do post atual.`},{cmd:'/',txt:`<b>O que faz:</b> Focar na barra de busca do subreddit.`},{cmd:'?',txt:`<b>O que faz:</b> Mostrar a lista completa de atalhos de teclado.`}],usecases:[{t:'Achar respostas técnicas em 30s',s:['Busque: site:reddit.com "erro X"','Filtre por subreddit: r/programming ou r/linux','Ordene por "Top" e "Past year" para evitar lixo']},{t:'Montar feed sem distrações',s:['Crie multireddit: reddit.com/r/ + sub1+sub2+sub3','Use old.reddit.com para layout compacto','Ative RES e filtre palavras-chave']},{t:'Pesquisa avançada nativa',s:['author:username → posts de um usuário','flair:"Ajuda" → apenas posts com flair','self:no → exclui text posts, só links']}],tips:{pro:['Use old.reddit.com + RES para velocidade e filtros avançados','Crie multireddits por tema (trabalho, estudo, diversão)','Salve buscas: reddit.com/search?q=...&sort=top&t=month','Ative modo compacto e desative autoplay de vídeos','Use Apollo/Sync no mobile para gestos rápidos'],erros:['Postar sem ler as regras na sidebar → ban instantâneo','Fazer crosspost em massa → shadowban','Comprar upvotes ou usar bots → conta suspensa','Ignorar flair obrigatório → post removido por AutoMod','Responder troll ou briga nos comentários → karma negativo']}},
slack:{icon:'#',title:'Slack',desc:'Chat para times',tags:'slack chat workspace',overview:`Slack organiza comunicação em canais, DMs e huddles. Use para decisões rápidas, documentação leve e automações com Workflow Builder.`,commands:[{cmd:'Cmd+K / Ctrl+K',txt:`<b>O que faz:</b> Quick Switcher. Pula para qualquer canal, DM ou mensagem salva.`},{cmd:'/remind [@pessoa ou @eu] [o que] [quando]',txt:`<b>O que faz:</b> Cria lembretes. Ex: /remind @eu revisar PR às 9h seg.`},{cmd:'/poll "Pergunta" "Op1" "Op2" "Op3"',txt:`<b>O que faz:</b> Enquete nativa no canal para decidir sem thread infinita.`},{cmd:'/huddle',txt:`<b>O que faz:</b> Inicia chamada de áudio instantânea no canal/DM.`},{cmd:'Cmd+Shift+M / Ctrl+Shift+M',txt:`<b>O que faz:</b> Vai direto para Mensagens Diretas.`},{cmd:'Cmd+Shift+U / Ctrl+Shift+U',txt:`<b>O que faz:</b> Abre seletor de upload de arquivo.`},{cmd:'/collapse e /expand',txt:`<b>O que faz:</b> Recolhe ou expande todas imagens/GIFs do canal.`},{cmd:'Cmd+F / Ctrl+F',txt:`<b>O que faz:</b> Busca avançada por mensagens, arquivos e pessoas.`},{cmd:'Shift+Enter',txt:`<b>O que faz:</b> Quebra de linha sem enviar — essencial para mensagens longas.`},{cmd:'/away e /active',txt:`<b>O que faz:</b> Define status como ausente ou volta ao ativo.`}],usecases:[{t:'Onboarding em 5 minutos',s:['Crie canal #onboarding-nome','Use /remind para checklist','Fixe mensagem com links','Adicione aos user groups']},{t:'Decisão assíncrona',s:['Poste contexto na thread','Rode /poll com opções claras','Fixe resultado']},{t:'Incidente produção',s:['/huddle no #incidentes','Documente tudo na thread','Use /collapse para foco']}],tips:{pro:['Sempre responda em thread para não poluir canal','Use Cmd+K — é 10x mais rápido que clicar','Nomeie canais com prefixos: #proj-, #team-, #ops-','Configure palavras-chave em Preferências > Notificações','Crie Workflow para aprovações sem código'],erros:['Usar @channel em vez de @here em canal grande','Enviar senha/token em chat aberto','Criar DM tableplus:{icon:'🗄️',title:'TablePlus',desc:'Cliente SQL moderno e rápido',tags:'database sql mysql postgres sqlite redis mongodb tableplus atalhos comandos',mac:true,overview:`TablePlus é o cliente SQL nativo para Mac/Windows que unifica MySQL, PostgreSQL, SQLite, SQL Server, Redis e MongoDB em uma interface instantânea. Edite dados inline com segurança, use filtros rápidos, SSH tunnel em 1 clique e workspace com abas. Perfeito para devs que vivem no banco.`,commands:[{cmd:'⌘+N',txt:`<b>O que faz:</b> Cria nova conexão. Use para alternar entre ambientes dev/staging/prod sem fechar a janela.`},{cmd:'⌘+T',txt:`<b>O que faz:</b> Abre nova aba SQL. Mantenha queries separadas por feature.`},{cmd:'⌘+W',txt:`<b>O que faz:</b> Fecha aba atual. Segure para fechar outras.`},{cmd:'⌘+K',txt:`<b>O que faz:</b> Quick Open. Digite nome do banco/tabela e pule em segundos.`},{cmd:'⌘+Enter',txt:`<b>O que faz:</b> Executa a seleção atual ou a query sob o cursor. Essencial para rodar rápido.`},{cmd:'⌘+R',txt:`<b>O que faz:</b> Executa todas as queries da aba. Use com LIMIT.`},{cmd:'⌘+/',txt:`<b>O que faz:</b> Comenta/descomenta linha. Ótimo para debug de WHERE.`},{cmd:'⌘+Shift+F',txt:`<b>O que faz:</b> Formata SQL automaticamente. Padroniza time inteiro.`},{cmd:'Ctrl+Space',txt:`<b>O que faz:</b> Autocomplete de tabelas, colunas e funções. Reduz digitação.`},{cmd:'⌘+D',txt:`<b>O que faz:</b> Duplica linha na grade de Dados. Clona registro em 1 clique.`},{cmd:'⌘+Shift+D',txt:`<b>O que faz:</b> Deleta linha selecionada com confirmação segura.`},{cmd:'⌘+S',txt:`<b>O que faz:</b> Salva arquivo .sql atual no disco.`},{cmd:'⌘+O',txt:`<b>O que faz:</b> Abre arquivo SQL existente.`},{cmd:'⌘+F',txt:`<b>O que faz:</b> Busca dentro da tabela ou do resultado.`},{cmd:'⌘+L',txt:`<b>O que faz:</b> Foca no filtro rápido da grade. Digite "status=1" e filtre.`},{cmd:'⌘+1',txt:`<b>O que faz:</b> Vai para aba Estrutura (colunas, índices).`},{cmd:'⌘+2',txt:`<b>O que faz:</b> Vai para aba Dados (visualização em tabela).`},{cmd:'⌘+3',txt:`<b>O que faz:</b> Vai para aba Query (editor SQL).`},{cmd:'⌘+B',txt:`<b>O que faz:</b> Mostra/oculta sidebar de conexões.`},{cmd:'⌘+P',txt:`<b>O que faz:</b> Command Palette. Execute qualquer ação sem mouse.`},{cmd:'⌘+E',txt:`<b>O que faz:</b> Exporta dados para CSV, JSON ou SQL dump.`},{cmd:'⌘+I',txt:`<b>O que faz:</b> Mostra informações da tabela (tamanho, engine, collation).`},{cmd:'⌘+Option+C',txt:`<b>O que faz:</b> Copia linhas como INSERT INTO. Perfeito para seed.`},{cmd:'F5',txt:`<b>O que faz:</b> Recarrega dados da tabela ativa.`},{cmd:'⌘+Shift+T',txt:`<b>O que faz:</b> Reabre última aba fechada.`},{cmd:'⌥+↑ / ⌥+↓',txt:`<b>O que faz:</b> Move linha selecionada para cima/baixo na edição.`},{cmd:'SELECT * FROM users LIMIT 100;',txt:`<b>O que faz:</b> Padrão seguro para explorar. Sempre use LIMIT em produção.`},{cmd:'EXPLAIN ANALYZE SELECT...',txt:`<b>O que faz:</b> Mostra plano de execução real com custo. Use antes de criar índice.`},{cmd:'SHOW CREATE TABLE users;',txt:`<b>O que faz:</b> Exibe DDL completo. Copie para migração.`},{cmd:'CREATE INDEX idx_users_email ON users(email);',txt:`<b>O que faz:</b> Cria índice para acelerar buscas por email. Rode fora de horário pico.`}],usecases:[{t:'Debug em produção seguro',s:['use ⌘+K para achar tabela','filtre com ⌘+L "created_at > now()-1d"','rode SELECT com LIMIT 100','use EXPLAIN antes de UPDATE']},{t:'Migração rápida',s:['SHOW CREATE TABLE na origem','copie DDL com ⌘+Option+C','cole no destino com ⌘+3','valide com ⌘+1 estrutura']},{t:'Export para time',s:['filtre dados','⌘+E exportar CSV','compartilhe via Slack','salve query com ⌘+S']}],tips:{pro:['ative Safe Mode em Preferences para evitar UPDATE sem WHERE','use workspaces por projeto para não misturar conexões','salve conexões com cores: vermelho=prod, verde=dev','configure SSH tunnel salvo para RDS','use múltiplos resultados com ; para rodar em lote'],erros:['rodar DELETE sem transação','esquecer LIMIT em SELECT *','criar índi :</b> Troca de workspace para cima/baixo.`},{cmd:'Shift+Super+PageUp',txt:`<b>O que faz:</b> Move janela atual para workspace superior.`},{cmd:'Super+M',txt:`<b>O que faz:</b> Abre/fechar central de notificações e calendário.`},{cmd:'Alt+F4',txt:`<b>O que faz:</b> Fecha janela ativa.`},{cmd:'Super+H',txt:`<b>O que faz:</b> Minimiza (oculta) janela.`},{cmd:"gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'",txt:`<b>O que faz:</b> Ativa tema escuro nativo sem extensão.`},{cmd:"gsettings set org.gnome.desktop.peripherals.touchpad tap-to-click true",txt:`<b>O que faz:</b> Habilita toque para clicar no touchpad.`},{cmd:"gsettings set org.gnome.desktop.interface show-battery-percentage true",txt:`<b>O que faz:</b> Mostra % da bateria na barra superior.`},{cmd:"gsettings set org.gnome.shell.extensions.dash-to-dock click-action 'minimize'",txt:`<b>O que faz:</b> Clicar no ícone minimiza app (comportamento Windows).`},{cmd:'gnome-extensions list',txt:`<b>O que faz:</b> Lista todas as extensões instaladas.`},{cmd:'gnome-extensions enable user-theme@gnome-shell-extensions.gcampax.github.com',txt:`<b>O que faz:</b> Ativa temas de usuário para customizar Shell.`},{cmd:'dconf dump /org/gnome/ > backup-gnome.txt',txt:`<b>O que faz:</b> Exporta TODAS as configs GNOME para backup.`},{cmd:'systemctl --user restart gnome-shell',txt:`<b>O que faz:</b> Reinicia GNOME no Wayland sem logout (alternativa ao Alt+F2 r).`}],usecases:[{t:'Setup inicial produtivo',s:['ative tap-to-click e dark mode via gsettings','instale extensão Dash to Dock','configure Super+1..9 para apps favoritos','ative workspaces dinâmicos']},{t:'Fluxo dev',s:['Ctrl+Alt+T abre terminal','Super+` alterna terminais','Super+←/→ divide editor e browser','Alt+F2 r reinicia após travar extensão']},{t:'Backup e migração',s:['dconf dump > backup','copie para novo PC','dconf load /org/gnome/ < backup','gnome-extensions list para reinstalar']}],tips:{pro:['use workspaces verticais: um por contexto (código, web, bash:{icon:'🐚',title:'Bash',desc:'Shell Unix, pipes, automação crítica',tags:'linux shell devops',
overview:`Bash é a camada de orquestração do Unix. Conceitos: processos, file descriptors (0/1/2), pipes conectam STDOUT→STDIN, redirects controlam fluxos, exit codes definem sucesso. Escolha Bash vs Python quando a tarefa é chamar binários, manipular arquivos e streams — é 10-100x mais rápido que reimplementar em linguagem geral. Trade-offs: sintaxe frágil, word splitting, globbing, falhas silenciosas. Em produção, sempre use <span class="kbd">set -euo pipefail</span>, IFS seguro e quoting. Prefira ferramentas GNU (grep/find/xargs) para dados >1GB versus loops.`,
commands:[
{cmd:'set -euo pipefail',txt:`<b>O que faz:</b> falha em erro, variável indefinida ou pipe quebrado. <b>Por que:</b> evita deploys meio-feitos. <b>Quando:</b> topo de todo script. <b>Ex:</b> #!/usr/bin/env bash\nset -euo pipefail. <b>Armadilha:</b> comandos que retornam 1 legitimamente precisam || true.`},
{cmd:'ls -lah --time-style=long-iso',txt:`<b>O que faz:</b> lista detalhada com datas ISO. <b>Por que:</b> auditoria, ordenação estável. <b>Quando:</b> inspeção rápida. <b>Ex:</b> ls -lah. <b>Armadilha:</b> em dirs gigantes use find -ls.`},
{cmd:'grep -rIn --color=auto "TODO" .',txt:`<b>O que faz:</b> busca recursiva com número da linha. <b>Por que:</b> encontra débito técnico. <b>Quando:</b> refactors. <b>Ex:</b> grep -rIn "TODO" src. <b>Armadilha:</b> binários — adicione --binary-files=without-match.`},
{cmd:'find . -type f -name "*.log" -mtime +7 -print0 | xargs -0 gzip',txt:`<b>O que faz:</b> comprime logs antigos com segurança para espaços. <b>Por que:</b> evita xargs quebrar. <b>Quando:</b> rotação. <b>Ex:</b> ... <b>Armadilha:</b> esquecer -print0/-0.`},
{cmd:"awk -F',' '{sum+=$3} END{print sum}' sales.csv",txt:`<b>O que faz:</b> soma coluna 3 CSV simples. <b>Por que:</b> processa GB sem Python. <b>Quando:</b> ETL rápido. <b>Ex:</b> ... <b>Armadilha:</b> CSV com vírgulas entre aspas → use miller.`},
{cmd:"sed -i.bak 's/DEBUG=false/DEBUG=true/' .env",txt:`<b>O que faz:</b> substituição in-place com backup. <b>Por que:</b> rollout seguro. <b>Quando:</b> feature flags. <b>Ex:</b> ... <b>Armadilha:</b> BSD sed precisa -i ''.`},
{cmd:'xargs -r -P4 -n1 curl -s -o /dev/null -w "%{url} %{http_code}\\n"',txt:`<b>O que faz:</b> paraleliza 4 requisições. <b>Por que:</b> healthcheck em massa. <b>Quando:</b> validar endpoints. <b>Armadilha:</b> limite de FDs.`},
{cmd:'tmux new -s deploy',txt:`<b>O que faz:</b> sessão persistente. <b>Por que:</b> evita perder deploy ao cair SSH. <b>Quando:</b> long runs. <b>Ex:</b> tmux attach -t deploy. <b>Armadilha:</b> esquecer de set -g mouse on.`},
{cmd:'sort access.log | uniq -c | sort -nr | head',txt:`<b>O que faz:</b> top IPs/requests. <b>Por que:</b> diagnóstico rápido. <b>Quando:</b> incidente. <b>Armadilha:</b> locale afeta sort → LC_ALL=C.`},
{cmd:'rsync -avh --delete --progress src/ user@host:/app/',txt:`<b>O que faz:</b> sync idempotente. <b>Por que:</b> deploy sem docker. <b>Armadilha:</b> barra final muda semântica.`},
],
usecases:[
{ t:'Processar logs Nginx 10GB', s:['zcat *.gz | cut -d" " -f1 | sort | uniq -c | sort -nr > top-ip.txt','awk \'$9>=500\' access.log > errors.log','parallel gzip ::: *.log']},
{ t:'Batch rename fotos', s:['for f in IMG_*.JPG; do ts=$(stat -f %Sm -t %Y%m%d_%H%M%S "$f"); mv "$f" "$ts.jpg"; done','Valide com echo antes do mv','Use rename -n para dry-run']},
{ t:'Deploy resiliente', s:['tmux new -s d','set -euo pipefail; ./build.sh && rsync...','tmux detach; reattach para logs']},
],
tips:{pro:['Use shellcheck em CI','Prefira [[ ]] ao [ ]','IFS=$\'\\n\\t\'','Nunca parse ls','log com exec > >(tee -a run.log) 2>&1'],erros:['Esquecer quotes em "$var"','Usar cd sem verificar || exit','Pipeline sem pipefail mascarando erro']}
},

overview:`PowerShell trata tudo como objeto .NET, não string. Pipeline passa propriedades tipadas, permitindo Where-Object/Select-Object sem parsing frágil. Escolha sobre Bash em ambientes Windows, AD, Azure e automações cross-platform (pwsh 7+). Trade-offs: verboso, startup mais lento, mas interoperabilidade COM/WMI/Graph é insuperável. Use modalidades estritas e codificação UTF-8.`,

const modal = document.getElementById('modal');
const mTitle = document.getElementById('mTitle');
const mIcon = document.getElementById('mIcon');
const pOverview = document.getElementById('p-overview');
const pCommands = document.getElementById('p-commands');
const pCases = document.getElementById('p-cases');
const pTips = document.getElementById('p-tips');

function openModal(id){
  const d = DATA[id];
  if(!d) return;
  mTitle.textContent = d.title;
  mIcon.innerHTML = d.icon;
  pOverview.innerHTML = `<div class="lead">${d.overview}</div>`;
  pCommands.innerHTML = `<div class="grid-2">${(d.commands||[]).map(c=>`
    <div class="cmd">
      <strong>${c.cmd.replace(/</g,'&lt;')}</strong>
      <button class="copy" data-cmd="${c.cmd.replace(/"/g,'&quot;')}">Copiar</button>
      <p>${c.txt}</p>
    </div>`).join('')}</div>`;
  pCases.innerHTML = (d.usecases||[]).map(cs=>`
    <div class="case"><h4>${cs.t}</h4><ol>${cs.s.map(li=>`<li>${li}</li>`).join('')}</ol></div>`).join('') || '<p class="lead">Adicione seus playbooks.</p>';
  pTips.innerHTML = `<div class="tips">
    <div class="tip"><h4>5 Dicas Pro</h4><ul>${(d.tips?.pro||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="tip"><h4>3 Erros que quebram produção</h4><ul>${(d.tips?.erros||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
  </div>`;
  modal.classList.add('active'); modal.setAttribute('aria-hidden','false');
}
function closeModal(){ modal.classList.remove('active'); modal.setAttribute('aria-hidden','true'); }

grid.addEventListener('click', e=>{
  const card = e.target.closest('.card'); if(card) openModal(card.dataset.id);
});
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', closeModal));
modal.querySelector('.backdrop').addEventListener('click', closeModal);
window.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab'); if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+btn.dataset.tab).classList.add('active');
});

document.addEventListener('click', e=>{
  const b = e.target.closest('.copy'); if(!b) return;
  navigator.clipboard.writeText(b.dataset.cmd).then(()=>{
    const old=b.textContent; b.textContent='Copiado!'; setTimeout(()=>b.textContent=old,1200);
  });
});

const q = document.getElementById('q');
q.addEventListener('input', ()=>{
  const v = q.value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c=>{
    const hit = !v || c.dataset.tags.toLowerCase().includes(v) || c.textContent.toLowerCase().includes(v);
    c.style.display = hit? '':'none';
  });
});
</script>
